server:
  port: 8080
  mode: debug

database:
  driver: mysql      # 建议加上驱动，方便以后扩展 pgsql
  host: 127.0.0.1    # 建议用 IP，有时 localhost 在 Docker 容器内会有指向问题
  port: 3306
  user: root
  password: 123456
  name: meteorx
  tls: false         # 修正：去掉引号
  debug: true        # 开启后在控制台输出 SQL 日志

redis:
  host: 127.0.0.1
  port: 6379
  password: ""
  db: 0

jwt:
  secret: "your-secret-key"
  expiration: 24h    # 对应 Go 的 time.Duration

log:
  level: info
  format: json       # 生产环境选 json，开发环境可以改为 text
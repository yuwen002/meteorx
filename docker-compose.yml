version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - METEORX_APP_PORT=8080
      - METEORX_APP_MODE=debug
      - METEORX_DB_HOST=mysql
      - METEORX_DB_PORT=3306
      - METEORX_DB_USER=root
      - METEORX_DB_PASSWORD=123456
      - METEORX_DB_NAME=meteorx
      - METEORX_DB_TLS=false
      - METEORX_REDIS_HOST=redis
      - METEORX_REDIS_PORT=6379
      - METEORX_REDIS_PASSWORD=
      - METEORX_REDIS_DB=0
      - METEORX_JWT_SECRET=your-secret-key
      - METEORX_JWT_EXPIRATION=24h
      - METEORX_JWT_ISSUER=meteorx-auth
    depends_on:
      - mysql
      - redis
    networks:
      - meteorx-network

  mysql:
    image: mysql:8.4
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=meteorx
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - meteorx-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - meteorx-network

volumes:
  mysql-data:
  redis-data:

networks:
  meteorx-network:
    driver: bridge
